{% extends "base.html" %}
{% block title %}Cambiar contraseña · Voto Cadena{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="eyebrow"><a href="{{ url_for('panel.usuarios') }}">Usuarios</a></div>
    <h1>Cambiar contraseña</h1>
  </div>
</div>

<div class="card" style="max-width:420px">
  <p>Usuario: <strong>{{ u.nombre_completo }}</strong> <span class="mono muted">({{ u.ci }})</span></p>
  <form method="POST" action="{{ url_for('panel.cambiar_password', uid=u.id) }}">
    <div class="field">
      <label for="nueva_password">Nueva contraseña</label>
      <input type="password" id="nueva_password" name="nueva_password" required minlength="8">
      <small class="muted">Mínimo 8 caracteres.</small>
    </div>
    <div class="gap-actions">
      <button type="submit" class="btn btn-primary">Actualizar contraseña</button>
      <a href="{{ url_for('panel.usuarios') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
