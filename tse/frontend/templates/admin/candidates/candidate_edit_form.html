{% extends "base.html" %}
{% block title %}Editar candidato · Voto Cadena{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="eyebrow">
      <a href="{{ url_for('panel.detalle_eleccion', eleccion_id=eleccion.id, tab='candidatos') }}">{{ eleccion.titulo }}</a> › Candidatos
    </div>
    <h1>Editar candidato</h1>
  </div>
</div>

<div class="card" style="max-width:680px">
  <form method="POST" action="{{ url_for('panel.editar_candidato', eleccion_id=eleccion.id, candidato_id=candidato.id) }}">
    <div class="field-row">
      <div class="field">
        <label>Número de lista</label>
        <input type="number" value="{{ candidato.numero_lista }}" disabled class="muted">
        <small class="muted">No editable después de la creación</small>
      </div>
      <div class="field">
        <label for="sigla_partido">Sigla del partido</label>
        <input type="text" id="sigla_partido" name="sigla_partido" required value="{{ candidato.sigla_partido }}">
      </div>
      <div class="field">
        <label for="color_partido">Color del partido</label>
        <input type="color" id="color_partido" name="color_partido" value="{{ candidato.color_partido or '#2e7d32' }}" style="height:42px;padding:.25rem">
      </div>
    </div>

    <div class="field">
      <label for="nombre_partido">Nombre completo del partido</label>
      <input type="text" id="nombre_partido" name="nombre_partido" value="{{ candidato.nombre_partido or '' }}">
    </div>

    <h3 style="margin-top:1.25rem">Candidato a presidente</h3>
    <div class="field-row">
      <div class="field">
        <label for="nombres">Nombres</label>
        <input type="text" id="nombres" name="nombres" required value="{{ candidato.nombres }}">
      </div>
      <div class="field">
        <label for="apellido_paterno">Apellido paterno</label>
        <input type="text" id="apellido_paterno" name="apellido_paterno" required value="{{ candidato.apellido_paterno }}">
      </div>
      <div class="field">
        <label for="apellido_materno">Apellido materno</label>
        <input type="text" id="apellido_materno" name="apellido_materno" value="{{ candidato.apellido_materno or '' }}">
      </div>
    </div>

    <h3>Fórmula (vicepresidente)</h3>
    <div class="field-row">
      <div class="field">
        <label for="formula_nombres">Nombres</label>
        <input type="text" id="formula_nombres" name="formula_nombres" value="{{ candidato.formula_nombres or '' }}">
      </div>
      <div class="field">
        <label for="formula_apellido_paterno">Apellido paterno</label>
        <input type="text" id="formula_apellido_paterno" name="formula_apellido_paterno" value="{{ candidato.formula_apellido_paterno or '' }}">
      </div>
    </div>

    <div class="field">
      <label for="propuesta_breve">Propuesta breve</label>
      <textarea id="propuesta_breve" name="propuesta_breve" rows="3" maxlength="200">{{ candidato.propuesta_breve or '' }}</textarea>
    </div>

    <div class="field">
      <label style="display:flex;gap:.5rem;align-items:center;color:var(--ink)">
        <input type="checkbox" name="activo" {{ 'checked' if candidato.activo else '' }}>
        Candidato activo (visible en la papeleta)
      </label>
    </div>

    <div class="gap-actions">
      <button type="submit" class="btn btn-primary">Guardar cambios</button>
      <a href="{{ url_for('panel.detalle_eleccion', eleccion_id=eleccion.id, tab='candidatos') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
